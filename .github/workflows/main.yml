name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:

env:
  apt: libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libxcursor-dev libxfixes-dev libxi-dev libxrandr-dev libxinerama-dev kcov

jobs:
  build_test:
    name: "Main build, fmt, code coverage and test."
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.apt }}

      - name: Zig details
        run: |
          zig version
          zig env

      - name: Build now
        run: |
          zig build ${{ matrix.THIS_OPTIM }}  --summary all

      - name: Test it
        run: zig build test ${{ matrix.THIS_OPTIM }} --summary all

      - name: check bin size
        run: ls -lht zig-out/bin

      - name: Run fmt check
        run: zig fmt --check . --exclude zig-cache --exclude zig-pkg

      - name: Check coverage
        run: zig build test -Dtest_coverage  --summary all

      - name: Download artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage_json_files
          path: |
            kcov-out/*/coverage.json
